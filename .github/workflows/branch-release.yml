name: "Strategy 2: Branch-Based Release"

# Triggered when a PR is merged into the release branch
on:
  pull_request:
    branches:
      - release
    types:
      - closed

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # Only run when the PR was actually merged (not just closed)
  deploy:
    name: Build and deploy docs
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release

      - name: Extract version from PR title
        id: version
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Expect PR titles like "Release v1.0.0"
          VERSION=$(echo "$PR_TITLE" | grep -oP 'v?\K[0-9]+\.[0-9]+\.[0-9]+' || echo "0.0.0")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Build site
        run: |
          mkdir -p _output
          sed "s/0\.1\.0/${{ steps.version.outputs.version }}/" site/index.html > _output/index.html
          echo "Built docs for v${{ steps.version.outputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: _output/

      - name: Tag the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Package the built site
          tar -czf docs-site-v${VERSION}.tar.gz -C _output .

          # Create a lightweight tag and GitHub Release
          gh release create "v${VERSION}" \
            docs-site-v${VERSION}.tar.gz \
            --title "Release v${VERSION}" \
            --generate-notes \
            --target release

  # ── Notify on PR opened (optional: CI check before merge) ───────
  validate:
    name: Validate docs build
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build check
        run: |
          echo "Validating site builds cleanly..."
          test -f site/index.html
          echo "Build validation passed"
